<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Attendance Kiosk</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        .kiosk-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        #videoElement {
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            background-color: #000;
            transform: scaleX(-1);
            border: 4px solid rgba(255, 255, 255, 0.2);
            transition: border-color 0.3s ease;
        }

        #canvasElement {
            display: none;
        }

        .status-box {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 500;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status-idle {
            background: rgba(255, 255, 255, 0.2);
        }

        .status-success {
            background: rgba(40, 167, 69, 0.8);
        }

        .status-error {
            background: rgba(220, 53, 69, 0.8);
        }

        .status-scanning {
            background: rgba(255, 193, 7, 0.8);
            color: black;
        }

        .pulse {
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% {
                box-shadow: 0 0 0 0px rgba(255, 255, 255, 0.2);
            }

            100% {
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }
        }
    </style>
</head>

<body>

    <div class="kiosk-container">
        <h1 class="display-4 fw-bold mb-2">AI Attendance</h1>
        <p class="lead mb-4">Please look at the camera to mark your attendance</p>

        <div class="position-relative d-inline-block">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvasElement"></canvas>
        </div>

        <div id="statusBox" class="status-box status-idle pulse mt-4">
            Waiting for face detection...
        </div>
    </div>

    <script>
        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const statusBox = document.getElementById('statusBox');

        let isProcessing = false;
        let scanInterval;

        // Access Webcam
        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: 640, height: 480 } });
                video.srcObject = stream;
                // Start scanning every 3 seconds once video plays
                video.onplaying = () => {
                    scanInterval = setInterval(scanFace, 3000);
                };
            } catch (err) {
                console.error("Error accessing webcam: ", err);
                updateStatus('Camera access denied. Please allow permissions.', 'error');
            }
        }

        startVideo();

        function updateStatus(msg, type) {
            statusBox.className = `status-box status-${type} ${type === 'idle' || type === 'scanning' ? 'pulse' : ''}`;
            statusBox.textContent = msg;
        }

        async function scanFace() {
            if (isProcessing) return;
            isProcessing = true;

            // Temporarily show scanning UI
            updateStatus('Scanning...', 'scanning');

            // Capture image from video
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;

            // Ensure image isn't mirrored for backend analysis
            context.translate(canvas.width, 0);
            context.scale(-1, 1);
            context.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Get base64 string
            const base64Image = canvas.toDataURL('image/jpeg', 0.8);

            const payload = {
                face_image_base64: base64Image
            };

            try {
                const response = await fetch('http://127.0.0.1:8000/api/verify/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    updateStatus(`Welcome, ${data.user.name}! Attendance marked.`, 'success');
                    // Pause scanning briefly after success
                    clearInterval(scanInterval);
                    setTimeout(() => {
                        updateStatus('Waiting for face detection...', 'idle');
                        scanInterval = setInterval(scanFace, 3000);
                    }, 5000);
                } else {
                    // Not recognized or no face, fallback to idle without aggressive error unless it's an actual match failure
                    if (response.status === 401) {
                        updateStatus('Face not recognized.', 'error');
                    } else {
                        updateStatus('Waiting for face detection...', 'idle');
                    }
                }
            } catch (err) {
                updateStatus('Network error connected to server.', 'error');
            } finally {
                isProcessing = false;
                // If it was just 'not recognized' or error, reset text after 2s
                if (statusBox.classList.contains('status-error')) {
                    setTimeout(() => {
                        if (!isProcessing) updateStatus('Waiting for face detection...', 'idle');
                    }, 2000);
                }
            }
        }
    </script>
</body>

</html>
