<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Attendance Admin</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- QRCode.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }

        .sidebar {
            min-height: 100vh;
            background-color: #212529;
            color: white;
            padding-top: 2rem;
        }

        .sidebar a {
            color: #adb5bd;
            text-decoration: none;
            padding: 10px 20px;
            display: block;
        }

        .sidebar a:hover,
        .sidebar a.active {
            color: white;
            background-color: #343a40;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #videoElement {
            width: 100%;
            border-radius: 8px;
            background-color: #000;
            transform: scaleX(-1);
        }

        #canvasElement {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar">
                <h4 class="text-center mb-4 text-primary">AI Attendance</h4>
                <a href="dashboard.html">Dashboard</a>
                <a href="register.html" class="active">Register New User</a>
                <div class="mt-5 px-3">
                    <button onclick="logout()" class="btn btn-outline-danger w-100 btn-sm">Logout</button>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-sm-auto px-md-4 py-4">
                <div
                    class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h1 class="h2">Register New User</h1>
                </div>

                <div class="row justify-content-center">
                    <div class="col-md-8">
                        <div class="card p-4">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label for="name" class="form-label fw-semibold">Full Name</label>
                                    <input type="text" class="form-control" id="name" required placeholder="John Doe">
                                </div>
                                <div class="mb-4">
                                    <label for="email" class="form-label fw-semibold">Email</label>
                                    <input type="email" class="form-control" id="email" required
                                        placeholder="john@example.com">
                                </div>

                                <div class="mb-4 text-center">
                                    <label class="form-label fw-semibold d-block text-start">Face Capture</label>

                                    <div class="d-flex justify-content-end mb-2">
                                        <button type="button" class="btn btn-sm btn-outline-secondary"
                                            id="toggleMobileBtn" onclick="toggleMobileCapture()">Capture via Mobile
                                            Phone</button>
                                    </div>

                                    <div id="desktopCaptureArea">
                                        <video id="videoElement" autoplay playsinline></video>
                                        <canvas id="canvasElement"></canvas>
                                        <p class="text-muted small mt-2">Position face clearly in the camera view.</p>
                                    </div>

                                    <div id="mobileCaptureArea" class="d-none border rounded p-4 bg-light">
                                        <h5 class="mb-3">Scan with Phone Camera</h5>
                                        <div id="qrcode" class="d-flex justify-content-center mb-3"></div>
                                        <p class="small text-muted mb-0" id="pollingStatus">Waiting for mobile
                                            capture...</p>
                                    </div>
                                    <div id="mobileSuccessArea" class="d-none border rounded p-4 bg-success text-white">
                                        <h3 class="mb-0">✓ Photos Received</h3>
                                        <p class="small mb-0">You can now submit the registration.</p>
                                    </div>
                                </div>

                                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" id="submitBtn">Register
                                    User</button>
                                <div id="statusAlert" class="alert mt-3 d-none" role="alert"></div>
                            </form>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = 'login.html';
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = 'login.html';
        }

        const video = document.getElementById('videoElement');
        const canvas = document.getElementById('canvasElement');
        const registerForm = document.getElementById('registerForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusAlert = document.getElementById('statusAlert');

        // Access Webcam
        async function startVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
            } catch (err) {
                console.error("Error accessing webcam: ", err);
                showAlert('Failed to access webcam. Please allow permissions.', 'danger');
            }
        }

        startVideo();

        // Mobile Capture Logic
        let useMobileCapture = false;
        let pollingInterval = null;
        let mobilePoses = null;

        // This is the IP we discovered using ipconfig
        const LOCAL_IP = "10.191.155.243";

        async function toggleMobileCapture() {
            useMobileCapture = true;
            document.getElementById('desktopCaptureArea').classList.add('d-none');
            document.getElementById('mobileCaptureArea').classList.remove('d-none');
            document.getElementById('toggleMobileBtn').classList.add('d-none');

            // Stop webcam
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            try {
                // Fetch Session and Config together
                const sessionRes = await fetch('http://127.0.0.1:8000/api/admin/mobile-session/create', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const sessionData = await sessionRes.json();
                const sessionId = sessionData.session_id;

                const configRes = await fetch('http://127.0.0.1:8000/api/admin/system-config', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const configData = await configRes.json();

                let mobileUrl = "";

                if (configData.ngrok_frontend_url && configData.ngrok_backend_url) {
                    // Global tunneling is active! Use the public URLs so mobile doesn't need Wi-Fi
                    const frontendUrl = configData.ngrok_frontend_url;
                    const backendUrl = configData.ngrok_backend_url;
                    mobileUrl = `${frontendUrl}/frontend-admin/mobile_capture.html?session=${sessionId}&api=${backendUrl}`;
                } else {
                    // Fallback to local IP if start_with_ngrok.py isn't used
                    const port = window.location.port ? `:${window.location.port}` : '';
                    mobileUrl = `http://${LOCAL_IP}${port}/frontend-admin/mobile_capture.html?session=${sessionId}&api=http://${LOCAL_IP}:8000`;
                }

                // Render QR
                new QRCode(document.getElementById("qrcode"), {
                    text: mobileUrl,
                    width: 200,
                    height: 200
                });

                // Start polling
                pollingInterval = setInterval(() => pollMobileSession(sessionId), 2000);
            } catch (e) {
                showAlert('Could not start mobile session.', 'danger');
            }
        }

        async function pollMobileSession(sessionId) {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/admin/mobile-session/${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'completed') {
                        clearInterval(pollingInterval);
                        mobilePoses = data.data;
                        document.getElementById('mobileCaptureArea').classList.add('d-none');
                        document.getElementById('mobileSuccessArea').classList.remove('d-none');
                    }
                }
            } catch (e) {
                // Ignore silent poll fails
            }
        }

        function showAlert(msg, type) {
            statusAlert.className = `alert mt-3 alert-${type}`;
            statusAlert.textContent = msg;
            statusAlert.classList.remove('d-none');
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Registering...';
            statusAlert.classList.add('d-none');

            let payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value
            };

            if (useMobileCapture) {
                if (!mobilePoses) {
                    showAlert('Please complete mobile capture first.', 'warning');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Register User';
                    return;
                }
                payload = { ...payload, ...mobilePoses };
            } else {
                // Capture image from video
                const context = canvas.getContext('2d');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.translate(canvas.width, 0);
                context.scale(-1, 1);
                context.drawImage(video, 0, 0, canvas.width, canvas.height);

                const base64Image = canvas.toDataURL('image/jpeg', 0.8);
                payload.face_encoding_front_base64 = base64Image;
                // Leave the other 4 angles as null/missing for standard desktop capture
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/admin/users', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (response.status === 401) {
                    logout();
                    return;
                }

                const data = await response.json();

                if (response.ok) {
                    showAlert('User registered successfully!', 'success');
                    registerForm.reset();
                } else {
                    showAlert(`Error: ${data.detail || 'Failed to register'}`, 'danger');
                }
            } catch (err) {
                console.error(err);
                showAlert('Network error occurred.', 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Register User';
            }
        });
    </script>
</body>

</html>
