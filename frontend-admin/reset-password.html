<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - AI Attendance Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10);
            width: 100%;
            max-width: 420px;
            padding: 2.2rem 2rem;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #0d6efd 0%, #6610f2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin: 0 auto 1.2rem;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: background .3s, width .3s;
            width: 0%;
        }

        .password-toggle {
            cursor: pointer;
            color: #6c757d;
        }

        .password-toggle:hover {
            color: #0d6efd;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="brand-icon">🔑</div>
        <h4 class="text-center fw-bold mb-1">Reset Your Password</h4>
        <p class="text-center text-muted mb-4" style="font-size:.88rem">Enter and confirm your new password below.</p>

        <!-- Invalid / expired token state -->
        <div id="invalidState" class="d-none">
            <div class="alert alert-danger text-center">
                <strong>❌ Invalid or expired link.</strong><br>
                <span style="font-size:.88rem">This reset link has expired or is invalid. Please request a new
                    one.</span>
            </div>
            <a href="login.html" class="btn btn-primary w-100 fw-bold mt-2">Back to Login</a>
        </div>

        <!-- Reset form -->
        <form id="resetForm">
            <div class="mb-3">
                <label for="newPassword" class="form-label fw-semibold">New Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="newPassword" required minlength="6"
                        placeholder="At least 6 characters">
                    <span class="input-group-text password-toggle" id="toggleNew" title="Show/hide password">👁</span>
                </div>
                <div class="mt-2" style="background:#e9ecef;border-radius:2px;height:4px;">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>
                <small id="strengthText" class="text-muted"></small>
            </div>
            <div class="mb-4">
                <label for="confirmPassword" class="form-label fw-semibold">Confirm Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="confirmPassword" required minlength="6"
                        placeholder="Repeat new password">
                    <span class="input-group-text password-toggle" id="toggleConfirm"
                        title="Show/hide password">👁</span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold" id="resetBtn">Set New Password</button>
            <div id="resetAlert" class="alert mt-3 d-none p-2 mb-0" role="alert"></div>
        </form>

        <div class="text-center mt-3">
            <a href="login.html" style="font-size:.85rem;color:#6c757d;text-decoration:none;">← Back to Login</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api/auth';

        // Read token from URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('resetForm').classList.add('d-none');
            document.getElementById('invalidState').classList.remove('d-none');
        }

        // Password visibility toggles
        document.getElementById('toggleNew').addEventListener('click', () => {
            const inp = document.getElementById('newPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        });
        document.getElementById('toggleConfirm').addEventListener('click', () => {
            const inp = document.getElementById('confirmPassword');
            inp.type = inp.type === 'password' ? 'text' : 'password';
        });

        // Password strength meter
        document.getElementById('newPassword').addEventListener('input', function () {
            const val = this.value;
            const bar = document.getElementById('strengthBar');
            const txt = document.getElementById('strengthText');
            let score = 0;
            if (val.length >= 6) score++;
            if (val.length >= 10) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;

            const levels = [
                { pct: '20%', color: '#dc3545', label: 'Very Weak' },
                { pct: '40%', color: '#fd7e14', label: 'Weak' },
                { pct: '60%', color: '#ffc107', label: 'Fair' },
                { pct: '80%', color: '#20c997', label: 'Strong' },
                { pct: '100%', color: '#198754', label: 'Very Strong' },
            ];
            if (val.length === 0) {
                bar.style.width = '0'; txt.textContent = ''; return;
            }
            const lvl = levels[Math.min(score - 1, 4)] || levels[0];
            bar.style.width = lvl.pct;
            bar.style.background = lvl.color;
            txt.textContent = lvl.label;
            txt.style.color = lvl.color;
        });

        // Form submission
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('resetBtn');
            const alertBox = document.getElementById('resetAlert');
            const newPwd = document.getElementById('newPassword').value;
            const confirmPwd = document.getElementById('confirmPassword').value;

            if (newPwd !== confirmPwd) {
                alertBox.className = 'alert mt-3 alert-warning p-2 mb-0';
                alertBox.textContent = 'Passwords do not match.';
                alertBox.classList.remove('d-none');
                return;
            }

            btn.disabled = true; alertBox.classList.add('d-none');

            try {
                const res = await fetch(`${API_BASE_URL}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPwd })
                });
                const data = await res.json();

                if (res.ok) {
                    alertBox.className = 'alert mt-3 alert-success p-2 mb-0';
                    alertBox.innerHTML = `<strong>✅ ${data.message}</strong><br><small>Redirecting to login…</small>`;
                    alertBox.classList.remove('d-none');
                    document.getElementById('resetForm').querySelectorAll('input,button').forEach(el => el.disabled = true);
                    setTimeout(() => window.location.href = 'login.html', 2500);
                } else {
                    // Likely invalid/expired token
                    document.getElementById('resetForm').classList.add('d-none');
                    document.getElementById('invalidState').classList.remove('d-none');
                }
            } catch {
                alertBox.className = 'alert mt-3 alert-danger p-2 mb-0';
                alertBox.textContent = 'Server error. Is the backend running?';
                alertBox.classList.remove('d-none');
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
