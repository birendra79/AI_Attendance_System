<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Email - AI Attendance Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            border: none;
            border-radius: 16px;
            max-width: 440px;
            width: 100%;
            padding: 2.5rem;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .icon {
            font-size: 3.5rem;
        }
    </style>
</head>

<body>

    <div class="card">
        <div id="loading">
            <div class="spinner-border text-primary mb-3" role="status"></div>
            <p class="text-muted">Verifying your email...</p>
        </div>
        <div id="success" class="d-none">
            <div class="icon mb-3">✅</div>
            <h3 class="fw-bold text-success">Email Confirmed!</h3>
            <p class="text-muted">Your admin account is now active. You can log in.</p>
            <a href="login.html" class="btn btn-primary mt-2 px-4 fw-bold">Go to Login</a>
        </div>
        <div id="error" class="d-none">
            <div class="icon mb-3">❌</div>
            <h3 class="fw-bold text-danger">Invalid Link</h3>
            <p class="text-muted" id="errorMsg">The confirmation link is invalid or has already been used.</p>
            <a href="login.html" class="btn btn-outline-secondary mt-2 px-4">Back to Login</a>
        </div>
    </div>

    <script>
        async function confirmToken() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (!token) {
                showError('No token found in the URL.');
                return;
            }
            try {
                const res = await fetch(`http://127.0.0.1:8000/api/auth/confirm/${token}`);
                const data = await res.json();
                if (res.ok) {
                    showSuccess();
                } else {
                    showError(data.detail || 'Confirmation failed.');
                }
            } catch (e) {
                showError('Server error. Make sure the backend is running.');
            }
        }

        function showSuccess() {
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('success').classList.remove('d-none');
        }
        function showError(msg) {
            document.getElementById('loading').classList.add('d-none');
            document.getElementById('errorMsg').textContent = msg;
            document.getElementById('error').classList.remove('d-none');
        }

        confirmToken();
    </script>
</body>

</html>
