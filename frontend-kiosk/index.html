<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification Kiosk - AI Attendance</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #fff;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Navbar */
        .kiosk-nav {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            letter-spacing: 0.5px;
        }

        .brand-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        /* Main Layout */
        .kiosk-layout {
            display: flex;
            flex: 1;
            height: calc(100vh - 73px);
        }

        /* Left: Camera View */
        .cam-container {
            flex: 7;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000;
            padding: 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }

        .cam-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4/3;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            /* Glowing border for active status */
            border: 2px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.2);
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .cam-wrapper.state-success {
            border-color: #10b981;
            box-shadow: 0 0 50px rgba(16, 185, 129, 0.3);
        }

        .cam-wrapper.state-spoof {
            border-color: #ef4444;
            box-shadow: 0 0 50px rgba(239, 68, 68, 0.3);
        }

        .cam-wrapper.state-unknown,
        .cam-wrapper.state-poor_quality {
            border-color: #f59e0b;
            box-shadow: 0 0 50px rgba(245, 158, 11, 0.3);
        }

        #videoElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            transform: scaleX(-1);
        }

        /* Scanning overlay line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 1);
            top: 0;
            left: 0;
            z-index: 3;
            animation: scan 3s linear infinite;
            display: none;
        }

        @keyframes scan {
            0% {
                top: 0%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                top: 100%;
                opacity: 0;
            }
        }

        /* Status Overlay */
        .status-overlay {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .status-overlay.show {
            opacity: 1;
        }

        .status-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #fff;
        }

        .status-text h4 {
            margin: 0;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .status-text p {
            margin: 0;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 500;
        }

        .status-overlay.success .status-icon {
            background: #10b981;
        }

        .status-overlay.success h4 {
            color: #10b981;
        }

        .status-overlay.spoof .status-icon {
            background: #ef4444;
        }

        .status-overlay.spoof h4 {
            color: #ef4444;
        }

        .status-overlay.poor_quality .status-icon,
        .status-overlay.unknown .status-icon {
            background: #f59e0b;
        }

        .status-overlay.poor_quality h4,
        .status-overlay.unknown h4 {
            color: #f59e0b;
        }

        /* Liveness Challenge Prompt */
        .liveness-prompt {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(59, 130, 246, 0.9);
            color: white;
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1.1rem;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            z-index: 10;
            display: none;
        }

        /* Right: Real-time Grid & Controls */
        .side-panel {
            flex: 3;
            display: flex;
            flex-direction: column;
            background: #1e293b;
            padding: 2rem;
            overflow-y: auto;
        }

        .panel-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .grid-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .student-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.3s;
        }

        .student-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #cbd5e1;
            font-size: 0.9rem;
        }

        .student-name {
            font-weight: 600;
            font-size: 0.95rem;
            color: #f8fafc;
            margin: 0;
        }

        .student-time {
            font-size: 0.75rem;
            color: #64748b;
            margin: 0;
        }

        .student-status {
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .status-present {
            background: rgba(16, 185, 129, 0.15);
            color: #34d399;
        }

        /* Admin Controls at bottom */
        .admin-controls {
            margin-top: auto;
            padding-top: 2rem;
        }
    </style>
</head>

<body>

    <nav class="kiosk-nav">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-expand text-white"></i></div>
            Aura Kiosk Mode
        </div>
        <div class="d-flex align-items-center gap-4">
            <div class="text-end">
                <div class="fw-bold" style="font-size: 1.1rem;" id="clock">10:45 AM</div>
                <div style="font-size: 0.8rem; color: #94a3b8; font-weight: 500;">CS101 - Morning Session</div>
            </div>
            <!-- Removed Exit button to completely isolate from Admin App -->
        </div>
    </nav>

    <div class="kiosk-layout">
        <!-- Live Camera View -->
        <div class="cam-container">
            <div class="cam-wrapper" id="camWrapper">
                <video id="videoElement" autoplay playsinline></video>
                <canvas id="overlayCanvas"></canvas>
                <div class="scan-line" id="scanLine"></div>

                <!-- Random Challenge Prompt -->
                <div class="liveness-prompt" id="livenessPrompt">
                    <i class="fa-regular fa-face-smile-wink me-2"></i> Please Blink Twice
                </div>

                <!-- Result Overlay -->
                <div class="status-overlay" id="statusOverlay">
                    <div class="status-icon"><i class="fa-solid fa-spinner fa-spin"></i></div>
                    <div class="status-text">
                        <h4 id="statusName">Authenticating...</h4>
                        <p id="statusMsg">Please hold still</p>
                    </div>
                </div>
            </div>

            <!-- Hint text -->
            <p class="text-center mt-4" style="color: #64748b; font-weight: 500;">
                <i class="fa-solid fa-user-shield me-2"></i> Please look directly at the camera.
            </p>
        </div>

        <!-- Real-time Presence Grid -->
        <div class="side-panel">
            <div class="panel-title">
                Live Presence Grid
                <span class="badge bg-primary rounded-pill">3 / 24</span>
            </div>

            <div class="grid-header">
                <span>Recent Logs</span>
                <span>Time</span>
            </div>

            <div id="logsContainer">
                <!-- JS Inject -->
            </div>

            <div class="admin-controls">
                <div class="d-flex justify-content-between align-items-center p-3 rounded"
                    style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);">
                    <div>
                        <div style="font-size:0.8rem; color:#94a3b8; font-weight: 600;">CLASS SESSION</div>
                        <div class="fw-bold text-white">CS101 - Morning</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden canvas for capturing frames -->
    <canvas id="captureCanvas" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000/api';

        // Dedicated Kiosk Interface
        // No admin token checked for verification loop. The device runs autonomously.

        // Clock Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }, 1000);

        // UI Elements
        const video = document.getElementById('videoElement');
        const overlay = document.getElementById('overlayCanvas');
        const captureCanvas = document.getElementById('captureCanvas');
        const ctxOverlay = overlay.getContext('2d');
        const ctxCapture = captureCanvas.getContext('2d');

        const camWrapper = document.getElementById('camWrapper');
        const statusOverlay = document.getElementById('statusOverlay');
        const statusName = document.getElementById('statusName');
        const statusMsg = document.getElementById('statusMsg');
        const scanLine = document.getElementById('scanLine');
        const livenessPrompt = document.getElementById('livenessPrompt');

        let isProcessing = false;
        let captureInterval = null;

        // Start Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 1280, height: 720 } });
                video.srcObject = stream;

                // Set canvas sizes once video starts playing
                video.addEventListener('loadedmetadata', () => {
                    overlay.width = video.videoWidth;
                    overlay.height = video.videoHeight;
                    captureCanvas.width = video.videoWidth;
                    captureCanvas.height = video.videoHeight;

                    // Start processing loop
                    captureInterval = setInterval(processFrame, 2000);
                });
            } catch (err) {
                console.error("Camera access denied", err);
                alert("Please allow camera access to use Kiosk Mode.");
            }
        }

        // Process a frame roughly every 2 seconds
        async function processFrame() {
            if (isProcessing) return; // Wait until previous request finishes

            // Draw current video frame to hidden canvas
            ctxCapture.save();
            ctxCapture.translate(captureCanvas.width, 0);
            ctxCapture.scale(-1, 1);
            ctxCapture.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
            ctxCapture.restore();

            const frameBase64 = captureCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];

            isProcessing = true;
            scanLine.style.display = 'block';

            try {
                // We'll call the /api/verify/verify endpoint
                const response = await fetch(`${API_BASE_URL}/verify/verify`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                        // No Authorization header needed since token requirement was removed
                    },
                    body: JSON.stringify({
                        frame: frameBase64,
                        session_id: 1 // hardcoded for now
                    })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showResult(data.student_name, `${data.confidence}% Match`, 'success');
                    addToGrid(data.student_name, 'Present');
                } else if (data.status === 'spoof') {
                    showResult('Spoof Detected', data.reason, 'spoof');
                } else if (data.status === 'poor_quality') {
                    showResult('Image Too Blurry', data.reason, 'poor_quality');
                } else if (data.status === 'unknown') {
                    // Check if it's not simply an unrecognized face, but a bad frame
                    showResult('Not Recognized', data.reason || 'Face not found in database', 'unknown');
                }

            } catch (err) {
                console.error("Verification error:", err);
            } finally {
                isProcessing = false;
                scanLine.style.display = 'none';
            }
        }

        function showResult(name, msg, type) {
            statusName.textContent = name;
            statusMsg.textContent = msg;

            statusOverlay.className = 'status-overlay show ' + type;
            camWrapper.className = 'cam-wrapper state-' + type;

            if (type === 'success') {
                statusOverlay.querySelector('.status-icon').innerHTML = '<i class="fa-solid fa-check"></i>';
            } else if (type === 'poor_quality') {
                statusOverlay.querySelector('.status-icon').innerHTML = '<i class="fa-solid fa-cloud"></i>';
            } else {
                statusOverlay.querySelector('.status-icon').innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i>';
            }

            // Hide after 3 seconds
            setTimeout(() => {
                statusOverlay.className = 'status-overlay';
                camWrapper.className = 'cam-wrapper';
            }, 3000);
        }

        function addToGrid(name, status) {
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const initials = name.split(' ').map(n => n[0]).join('').substring(0, 2);

            const html = `
                <div class="student-item" style="animation: fadeIn 0.5s">
                    <div class="student-info">
                        <div class="student-avatar">${initials}</div>
                        <div>
                            <p class="student-name">${name}</p>
                            <p class="student-time">${time}</p>
                        </div>
                    </div>
                    <div class="student-status status-present">${status}</div>
                </div>
            `;

            const container = document.getElementById('logsContainer');
            container.insertAdjacentHTML('afterbegin', html);

            // Keep list bounded
            if (container.children.length > 8) {
                container.lastElementChild.remove();
            }
        }

        // Initialize
        startCamera();

    </script>
</body>

</html>
